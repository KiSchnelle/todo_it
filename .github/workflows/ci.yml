name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run check-types
      - run: npm run lint
      - name: Test (Linux, headless)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test
      - name: Test (macOS / Windows)
        if: runner.os != 'Linux'
        run: npm test

  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run vsix
      - uses: actions/upload-artifact@v6
        with:
          name: todo-it-vsix
          path: todo-it.vsix
