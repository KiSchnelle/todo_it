name: Publish

# Triggered when a GitHub Release is published (drafts do NOT trigger it).
# Flow: draft a release in the UI → click "Publish release" → this runs.
# workflow_dispatch is kept as an escape hatch and takes the tag as input.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.0.2)"
        required: true

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.release.tag_name || inputs.tag || github.run_id }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win32-x64
          - os: windows-11-arm
            target: win32-arm64
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-13
            target: darwin-x64
          - os: macos-latest
            target: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # vsce runs `vscode:prepublish` (type-check + lint + production build) first.
      - run: npx vsce publish --target ${{ matrix.target }} --skip-duplicate
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
